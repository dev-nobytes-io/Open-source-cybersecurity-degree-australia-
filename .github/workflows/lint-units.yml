name: Lint Unit Files

on:
  pull_request:
    paths:
      - "core/units/**.md"
      - "degrees/**.md"
      - ".github/scripts/lint_units.py"
      - ".github/workflows/lint-units.yml"
  push:
    branches:
      - main
    paths:
      - "core/units/**.md"
      - "degrees/**.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Lint unit files against the template structure
        run: python3 .github/scripts/lint_units.py
