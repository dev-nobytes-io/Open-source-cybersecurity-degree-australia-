name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: .github/requirements-docs.txt

      - name: Install MkDocs and dependencies
        run: pip install -r .github/requirements-docs.txt

      - name: Stage markdown files for MkDocs
        run: python3 .github/prepare_wiki.py

      - name: Configure Git for gh-pages push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and deploy to GitHub Pages
        run: mkdocs gh-deploy --force --clean
