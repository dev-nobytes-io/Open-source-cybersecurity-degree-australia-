site_name: Open Source Cybersecurity Degree — Australia
site_description: A free, open-source cybersecurity education pathway aligned to Australian tertiary education standards (TEQSA/AQF) and recognised industry frameworks.
site_url: https://dev-nobytes-io.github.io/Open-source-cybersecurity-degree-australia-/
repo_url: https://github.com/dev-nobytes-io/Open-source-cybersecurity-degree-australia-
repo_name: GitHub
edit_uri: edit/main/

docs_dir: wiki_src
site_dir: site


theme:
  name: material
  favicon: https://upload.wikimedia.org/wikipedia/commons/b/b0/Australian_Signals_Directorate_logo.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dev-nobytes-io/Open-source-cybersecurity-degree-australia-
  generator: false

